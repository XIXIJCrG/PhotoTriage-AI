name: Bug report
description: Report a reproducible problem in PhotoTriage AI.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please include the smallest workflow that reproduces the issue.
      placeholder: |
        1. Open...
        2. Select...
        3. Click...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, provider mode, and model endpoint type.
      placeholder: Windows 11, Python 3.12, local llama.cpp
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have removed private photos, API keys, local paths, and personal metadata from this report.
          required: true
