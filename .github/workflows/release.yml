name: Build Windows Portable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-portable:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v

      - name: Build portable package
        shell: pwsh
        run: ./scripts/build_portable.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoTriageAI-windows-portable
          path: dist/PhotoTriageAI-windows-portable.zip

      - name: Attach package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PhotoTriageAI-windows-portable.zip
